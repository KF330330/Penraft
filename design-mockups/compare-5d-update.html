<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>5D · 关于 section A / B 对比</title>
<style>
  :root {
    --page-bg: #f5f3ef;
    --page-text: #24201a;
    --page-muted: #7c746a;
    --page-line: rgba(36, 30, 21, 0.12);
    --page-panel: #ffffff;
    --label-bg: #24201a;
    --label-text: #fbfaf8;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --page-bg: #1f1d1a;
      --page-text: #fbfaf8;
      --page-muted: #9b938a;
      --page-line: rgba(255, 255, 255, 0.08);
      --page-panel: #28251f;
      --label-bg: #fbfaf8;
      --label-text: #1f1d1a;
    }
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--page-bg); color: var(--page-text);
    font-family: "PingFang SC", "Helvetica Neue", Helvetica, Arial, ui-sans-serif, system-ui, sans-serif;
    padding: 28px 32px 48px;
    min-height: 100vh;
  }
  header { max-width: 1480px; margin: 0 auto 24px; }
  h1 { font-size: 22px; font-weight: 600; margin: 0 0 6px; }
  .sub { color: var(--page-muted); font-size: 13px; line-height: 1.6; }
  .grid {
    max-width: 1480px; margin: 0 auto;
    display: grid; grid-template-columns: 1fr 1fr; gap: 24px;
  }
  @media (max-width: 900px) { .grid { grid-template-columns: 1fr; } }
  .cell {
    display: flex; flex-direction: column;
    background: var(--page-panel);
    border: 1px solid var(--page-line);
    border-radius: 14px;
    overflow: hidden;
  }
  .cell-head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 16px;
    border-bottom: 1px solid var(--page-line);
  }
  .num {
    display: inline-flex; align-items: center; justify-content: center;
    width: 28px; height: 28px;
    background: var(--label-bg); color: var(--label-text);
    border-radius: 8px;
    font-size: 14px; font-weight: 700;
    margin-right: 12px;
  }
  .title { font-size: 15px; font-weight: 600; }
  .tag { color: var(--page-muted); font-size: 12px; margin-left: 8px; font-weight: 400; }
  .open {
    text-decoration: none; color: var(--page-muted);
    font-size: 12px; padding: 5px 10px;
    border: 1px solid var(--page-line); border-radius: 6px;
  }
  .open:hover { color: var(--page-text); }
  iframe { width: 100%; height: 660px; border: 0; display: block; }
  footer {
    max-width: 1480px; margin: 24px auto 0;
    color: var(--page-muted); font-size: 12px; line-height: 1.7;
  }
</style>
</head>
<body>
<header>
  <h1>5D · 关于 section A / B 对比</h1>
  <p class="sub">点 iframe 里的「检查更新」可以看交互（checking → 已是最新版本 → 自动恢复）。挑一个告诉我。</p>
</header>

<div class="grid">
  <div class="cell">
    <div class="cell-head">
      <div><span class="num">A</span><span class="title">紧凑单行</span><span class="tag">当前版本 v0.3.5 ｜ 检查更新 ›</span></div>
      <a class="open" href="mockup-5-d-a.html" target="_blank">大图 ↗</a>
    </div>
    <iframe src="mockup-5-d-a.html"></iframe>
  </div>
  <div class="cell">
    <div class="cell-head">
      <div><span class="num">B</span><span class="title">操作即标题</span><span class="tag">检查更新 ｜ v0.3.5</span></div>
      <a class="open" href="mockup-5-d-b.html" target="_blank">大图 ↗</a>
    </div>
    <iframe src="mockup-5-d-b.html"></iframe>
  </div>
</div>

<footer>
  · A：版本号嵌入左侧 label，「检查更新」蓝色文字 + chevron 在右；整行可点。<br>
  · B：「检查更新」作为主 label，版本号右侧灰 mono；整行可点；点击中 label 替换为「检查中…」「已是最新版本」。
</footer>
</body>
</html>
