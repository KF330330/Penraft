<!DOCTYPE html>
<html lang="zh-CN" data-theme="paper">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Penraft Settings — iOS Row Style (变体 C：input + 修改按钮)</title>
<style>
  :root,
  [data-theme="paper"] {
    --bg: #f5f3ef;
    --panel: #fbfaf8;
    --panel-strong: #ffffff;
    --line: rgba(36, 30, 21, 0.12);
    --line-strong: rgba(36, 30, 21, 0.18);
    --text: #24201a;
    --muted: #7c746a;
    --muted-2: #a49b90;
    --accent: #111827;
    --accent-soft: rgba(17, 24, 39, 0.08);
    --top-bar-bg: #f1ede5;
    --heading-accent: #b45309;
    --backdrop: rgba(25, 21, 17, 0.36);
    --shadow: 0 18px 50px rgba(28, 22, 16, 0.12);
    --radius: 16px;
    --font: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", "Helvetica Neue", "Microsoft YaHei", Helvetica, Arial, ui-sans-serif, system-ui, sans-serif;
    --mono: "SFMono-Regular", ui-monospace, Menlo, Consolas, "Liberation Mono", monospace;

    /* iOS-style icon container fills (derived from accent / semantic) */
    --icon-theme-bg: #5b8def;      /* blue — appearance */
    --icon-vault-bg: #4cb781;      /* green — storage */
    --icon-update-bg: #f08a3e;     /* orange — refresh */

    /* iOS-style link blue (kept stable across themes for affordance) */
    --link: #0a7aff;
  }

  [data-theme="light"] {
    --bg: #ffffff;
    --panel: #fafafa;
    --panel-strong: #ffffff;
    --line: rgba(36, 30, 21, 0.10);
    --line-strong: rgba(36, 30, 21, 0.16);
    --text: #24292e;
    --muted: #7c746a;
    --muted-2: #a49b90;
    --top-bar-bg: #f6f6f5;
    --heading-accent: #24292e;
    --backdrop: rgba(0, 0, 0, 0.32);
    --accent: #111827;
    --accent-soft: rgba(17, 24, 39, 0.08);
    --shadow: 0 18px 50px rgba(0, 0, 0, 0.10);

    --icon-theme-bg: #4a86ff;
    --icon-vault-bg: #3aaf78;
    --icon-update-bg: #f08a3e;
    --link: #007aff;
  }

  [data-theme="dark"] {
    --bg: #1f1d1a;
    --panel: #28251f;
    --panel-strong: #3a342a;
    --line: rgba(255, 255, 255, 0.08);
    --line-strong: rgba(255, 255, 255, 0.14);
    --text: #ffffff;
    --muted: #9b938a;
    --muted-2: #6a6258;
    --accent: #d8a464;
    --accent-soft: rgba(216, 164, 100, 0.12);
    --top-bar-bg: #2c2a26;
    --heading-accent: #d8a464;
    --backdrop: rgba(0, 0, 0, 0.5);
    --shadow: 0 20px 60px rgba(0, 0, 0, 0.5);

    --icon-theme-bg: #4a86ff;
    --icon-vault-bg: #3aaf78;
    --icon-update-bg: #e08a4a;
    --link: #4ea1ff;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  body {
    position: relative;
    min-height: 100vh;
    overflow: hidden;
  }

  /* ---------- App-like background scene ---------- */
  .app-scene {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
  }

  .app-topbar {
    height: 44px;
    background: var(--top-bar-bg);
    border-bottom: 1px solid var(--line);
    display: flex;
    align-items: center;
    padding: 0 14px;
    gap: 8px;
    position: relative;
    z-index: 2;
  }

  .traffic {
    display: flex;
    gap: 6px;
    margin-right: 8px;
  }
  .traffic span {
    width: 11px;
    height: 11px;
    border-radius: 50%;
    background: var(--line-strong);
    display: inline-block;
  }
  .traffic span:nth-child(1) { background: #ff5f57; }
  .traffic span:nth-child(2) { background: #febc2e; }
  .traffic span:nth-child(3) { background: #28c840; }

  .app-tab {
    font-size: 12.5px;
    color: var(--muted);
    padding: 4px 10px;
    border-radius: 6px;
  }
  .app-tab.active {
    color: var(--text);
    background: var(--panel);
  }

  .app-spacer { flex: 1; }

  .app-gear {
    width: 30px;
    height: 30px;
    border-radius: 8px;
    border: none;
    background: transparent;
    color: var(--text);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: background 0.15s ease;
  }
  .app-gear:hover { background: var(--accent-soft); }
  .app-gear:active { background: var(--line); }
  .app-gear svg { width: 18px; height: 18px; }

  .app-body {
    flex: 1;
    padding: 32px 48px;
    color: var(--muted-2);
    font-size: 13px;
    line-height: 1.9;
    overflow: hidden;
  }
  .app-body .mock-title {
    font-size: 22px;
    color: var(--heading-accent);
    font-weight: 600;
    margin-bottom: 12px;
    letter-spacing: -0.01em;
  }
  .app-body .mock-line {
    height: 8px;
    width: 60%;
    background: var(--line);
    border-radius: 4px;
    margin: 10px 0;
  }
  .app-body .mock-line.short { width: 35%; }
  .app-body .mock-line.medium { width: 48%; }

  /* ---------- Theme toggle (top-left, for previewing) ---------- */
  .theme-toggle {
    position: fixed;
    top: 12px;
    right: 56px;
    z-index: 10;
    display: flex;
    gap: 4px;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 3px;
    box-shadow: 0 1px 2px rgba(0,0,0,0.04);
  }
  .theme-toggle button {
    border: none;
    background: transparent;
    color: var(--muted);
    font-family: var(--font);
    font-size: 11px;
    font-weight: 500;
    padding: 4px 10px;
    border-radius: 999px;
    cursor: pointer;
    letter-spacing: 0.02em;
  }
  .theme-toggle button.active {
    background: var(--panel-strong);
    color: var(--text);
    box-shadow: 0 1px 2px rgba(0,0,0,0.08);
  }

  /* ---------- Backdrop + popover ---------- */
  .backdrop {
    position: fixed;
    inset: 0;
    background: var(--backdrop);
    backdrop-filter: blur(2px);
    -webkit-backdrop-filter: blur(2px);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s ease;
    z-index: 20;
  }
  .backdrop.open {
    opacity: 1;
    pointer-events: auto;
  }

  .settings-card {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, calc(-50% + 12px));
    width: 340px;
    background: var(--panel);
    border-radius: 18px;
    box-shadow: var(--shadow);
    z-index: 30;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s ease, transform 0.22s cubic-bezier(0.2, 0.8, 0.2, 1);
    overflow: hidden;
    border: 1px solid var(--line);
  }
  .settings-card.open {
    opacity: 1;
    pointer-events: auto;
    transform: translate(-50%, -50%);
  }

  /* Header bar */
  .settings-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 16px 10px;
  }
  .settings-title {
    font-size: 16px;
    font-weight: 600;
    letter-spacing: -0.01em;
    color: var(--text);
  }
  .settings-close {
    width: 26px;
    height: 26px;
    border-radius: 50%;
    border: none;
    background: var(--accent-soft);
    color: var(--muted);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: background 0.15s ease, color 0.15s ease;
  }
  .settings-close:hover {
    background: var(--line-strong);
    color: var(--text);
  }
  .settings-close svg { width: 14px; height: 14px; }

  /* Group label (iOS section header) */
  .group-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--muted);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 14px 18px 6px;
  }

  /* Grouped table */
  .group {
    margin: 0 12px 6px;
    background: var(--panel-strong);
    border-radius: 12px;
    overflow: hidden;
  }

  .row {
    display: flex;
    align-items: center;
    min-height: 44px;
    padding: 0 12px 0 12px;
    position: relative;
    cursor: pointer;
    transition: background 0.12s ease;
  }
  .row:hover {
    background: var(--accent-soft);
  }
  .row:active {
    background: var(--line);
  }
  .row.no-hover {
    cursor: default;
  }
  .row.no-hover:hover {
    background: transparent;
  }

  /* Hairline separator between rows */
  .row + .row::before {
    content: "";
    position: absolute;
    top: 0;
    left: 50px; /* aligned to right of icon */
    right: 0;
    height: 0.5px;
    background: var(--line);
    transform: scaleY(0.5);
    transform-origin: 0 0;
  }

  .row-icon {
    width: 24px;
    height: 24px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #ffffff;
    flex-shrink: 0;
    margin-right: 12px;
  }
  .row-icon svg { width: 14px; height: 14px; }

  .row-icon.theme { background: var(--icon-theme-bg); }
  .row-icon.vault { background: var(--icon-vault-bg); }
  .row-icon.update { background: var(--icon-update-bg); }

  .row-label {
    font-size: 14px;
    color: var(--text);
    font-weight: 400;
    flex-shrink: 0;
  }

  .row-tail {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 6px;
    min-width: 0;
  }

  .row-value {
    font-size: 13px;
    color: var(--muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 180px;
  }
  .row-value.mono {
    font-family: var(--mono);
    font-size: 12px;
  }

  .chevron {
    width: 14px;
    height: 14px;
    color: var(--muted-2);
    flex-shrink: 0;
  }

  /* ----- Theme swatches row (right side) ----- */
  .swatch-list {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .swatch {
    position: relative;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    cursor: pointer;
    border: 1px solid var(--line-strong);
    transition: transform 0.12s ease;
  }
  .swatch:hover { transform: scale(1.08); }
  .swatch.paper { background: #f1ede5; }
  .swatch.light { background: #ffffff; }
  .swatch.dark { background: #2c2a26; }
  .swatch.active {
    border: 2px solid var(--link);
    box-shadow: 0 0 0 2px var(--panel-strong);
  }
  .swatch.active::after {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: 50%;
    box-shadow: 0 0 0 1.5px var(--link);
  }

  /* ----- Vault path row (变体 C：input + 修改按钮) ----- */
  .row-path {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    justify-content: center;
    padding: 10px 12px 12px;
    min-height: 56px;
    cursor: default;
  }
  .row-path:hover { background: transparent; }
  .row-path-top {
    display: flex;
    align-items: center;
    width: 100%;
  }
  .row-path-bottom {
    width: 100%;
    padding-left: 36px; /* align under label, past icon */
    margin-top: 8px;
    display: flex;
    align-items: stretch;
    gap: 8px;
  }
  .path-input {
    flex: 1;
    min-width: 0;
    display: flex;
    align-items: center;
    background: var(--bg);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 6px 10px;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text);
    overflow: hidden;
    cursor: text;
    transition: border-color 0.12s ease;
  }
  .path-input:hover { border-color: var(--line-strong); }
  .path-input span {
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    direction: rtl;
    text-align: left;
    unicode-bidi: plaintext;
    width: 100%;
  }
  .path-btn {
    flex-shrink: 0;
    background: var(--panel-strong);
    border: 1px solid var(--line-strong);
    border-radius: 8px;
    padding: 0 14px;
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    cursor: pointer;
    transition: background 0.12s ease, border-color 0.12s ease;
    font-family: var(--font);
  }
  .path-btn:hover {
    background: var(--accent-soft);
    border-color: var(--accent);
  }
  .path-btn:active {
    background: var(--line);
  }

  /* ----- Update row ----- */
  .row-action {
    color: var(--link);
    font-size: 14px;
    font-weight: 500;
    background: none;
    border: none;
    padding: 0;
    cursor: pointer;
    font-family: var(--font);
  }
  .row-action:hover { opacity: 0.75; }

  .update-status {
    font-size: 12px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .update-status.checking svg {
    animation: spin 1s linear infinite;
  }
  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  /* ----- Footer hint ----- */
  .settings-footer {
    padding: 10px 18px 16px;
    text-align: center;
    font-size: 11px;
    color: var(--muted-2);
    line-height: 1.5;
  }

  /* ----- Toast hint (dynamic states reminder) ----- */
  .state-hint {
    font-size: 11px;
    color: var(--muted-2);
    padding: 0 18px 6px;
    text-align: center;
    line-height: 1.4;
  }

  /* small focus ring */
  button:focus-visible,
  .swatch:focus-visible,
  .row:focus-visible {
    outline: 2px solid var(--link);
    outline-offset: 2px;
  }
</style>
</head>
<body>

  <!-- ====== App scene (mocked Penraft window) ====== -->
  <div class="app-scene">
    <div class="app-topbar">
      <div class="traffic"><span></span><span></span><span></span></div>
      <div class="app-tab active">README.md</div>
      <div class="app-tab">notes.md</div>
      <div class="app-tab">ideas.md</div>
      <div class="app-spacer"></div>
      <button class="app-gear" id="gear-btn" aria-label="Settings" title="Settings">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>

      <div class="mock-line"></div>

      <div class="mock-line short"></div>
      <div class="mock-line"></div>
      <div class="mock-line medium"></div>
    </div>
  </div>

  <!-- ====== Theme preview toggle ====== -->
  <div class="theme-toggle" role="tablist" aria-label="Preview theme">
    <button data-preview="paper" class="active">Paper</button>
    <button data-preview="light">Light</button>
    <button data-preview="dark">Dark</button>
  </div>

  <!-- ====== Backdrop ====== -->
  <div class="backdrop" id="backdrop"></div>

  <!-- ====== Settings card (popover) ====== -->
  <div class="settings-card" id="settings-card" role="dialog" aria-label="设置">

    <div class="settings-header">
      <div class="settings-title">设置</div>
      <button class="settings-close" id="close-btn" aria-label="关闭">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">

    <!-- ----- Section 1: Appearance ----- -->

          <div class="swatch dark" data-theme-pick="dark" role="radio" aria-checked="false" title="Dark · 暗色"></div>
        </div>
      </div>

    <!-- ----- Section 2: Storage (变体 C：input + 修改按钮) ----- -->
    <div class="group-label">存储</div>

      <div class="row row-path">
        <div class="row-path-top">
          <div class="row-icon vault">

            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">

            </svg>

            <span>/Users/rl/Documents/PenraftVault</span>
          </div>
          <button class="path-btn" type="button">修改…</button>
        </div>
      </div>

    <!-- ----- Section 3: Updates ----- -->
    <div class="group-label">关于</div>
    <div class="group">
      <div class="row no-hover">
        <div class="row-icon update">
          <!-- refresh icon -->
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="23 4 23 10 17 10"/>
            <polyline points="1 20 1 14 7 14"/>
            <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10"/>
            <path d="M20.49 15a9 9 0 0 1-14.85 3.36L1 14"/>
          </svg>

        </div>

      <div class="row" id="check-update-row" role="button" tabindex="0">
        <div class="row-icon update" style="visibility: hidden;">
          <svg viewBox="0 0 24 24"></svg>
        </div>
        <button class="row-action" id="check-update-btn">检查更新</button>
        <div class="row-tail">
          <span class="update-status" id="update-status"></span>
        </div>
      </div>
    </div>

    <div class="state-hint">检查更新会显示「检查中…」「已是最新版本」或「检查失败」</div>

    <div class="settings-footer">
      Penraft · 你的本地优先 Markdown 笔记
    </div>
  </div>

<script>
  // ---- Gear / backdrop / close toggling ----
  const gear = document.getElementById('gear-btn');
  const card = document.getElementById('settings-card');
  const backdrop = document.getElementById('backdrop');
  const closeBtn = document.getElementById('close-btn');

  function openSettings() {
    card.classList.add('open');
    backdrop.classList.add('open');
  }
  function closeSettings() {
    card.classList.remove('open');
    backdrop.classList.remove('open');
  }
  gear.addEventListener('click', () => {
    if (card.classList.contains('open')) closeSettings();
    else openSettings();
  });
  closeBtn.addEventListener('click', closeSettings);
  backdrop.addEventListener('click', closeSettings);
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closeSettings();
  });

  // ---- Theme preview toggle (top-right) ----
  const previewBtns = document.querySelectorAll('.theme-toggle button');
  previewBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      const t = btn.dataset.preview;
      document.documentElement.setAttribute('data-theme', t);
      previewBtns.forEach(b => b.classList.toggle('active', b === btn));
      // sync the in-card swatch selection too
      document.querySelectorAll('.swatch').forEach(s => {
        s.classList.toggle('active', s.dataset.themePick === t);
        s.setAttribute('aria-checked', s.dataset.themePick === t ? 'true' : 'false');
      });
    });
  });

  // ---- In-card swatches drive theme too ----
  document.querySelectorAll('.swatch').forEach(s => {
    s.addEventListener('click', () => {
      const t = s.dataset.themePick;
      document.documentElement.setAttribute('data-theme', t);
      document.querySelectorAll('.swatch').forEach(x => {
        x.classList.toggle('active', x === s);
        x.setAttribute('aria-checked', x === s ? 'true' : 'false');
      });
      previewBtns.forEach(b => b.classList.toggle('active', b.dataset.preview === t));
    });
  });

  // ---- Check update demo (idle → checking → up-to-date) ----
  const checkBtn = document.getElementById('check-update-btn');
  const statusEl = document.getElementById('update-status');
  let checking = false;

  function setStatusChecking() {
    statusEl.classList.add('checking');
    statusEl.innerHTML = `
      <svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <polyline points="23 4 23 10 17 10"/>
        <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
      </svg>
      检查中…
    `;
  }
  function setStatusUpToDate() {
    statusEl.classList.remove('checking');
    statusEl.innerHTML = `
      <svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="color: var(--icon-vault-bg);">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
      已是最新版本
    `;
  }
  function clearStatus() {
    statusEl.classList.remove('checking');
    statusEl.innerHTML = '';
  }

  checkBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    if (checking) return;
    checking = true;
    setStatusChecking();
    setTimeout(() => {
      setStatusUpToDate();
      checking = false;
      // auto-clear after 4s so user can re-check
      setTimeout(() => clearStatus(), 4000);
    }, 1200);
  });

  // Open by default so the design is visible without interaction
  openSettings();
</script>
</body>
</html>
