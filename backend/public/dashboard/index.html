<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Penraft Dashboard</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
</head>
<body>
  <header class="topbar">
    <div class="topbar-left">
      <h1>Penraft Dashboard</h1>
      <div class="tabs" role="tablist">
        <button class="tab active" data-tab="web" role="tab">官网</button>
        <button class="tab" data-tab="app" role="tab">App</button>
      </div>
    </div>

    <div class="filters">
      <div class="preset" role="group" aria-label="时间预设">
        <button data-preset="today">今天</button>
        <button data-preset="7d" class="active">7 天</button>
        <button data-preset="30d">30 天</button>
        <button data-preset="custom">自定义</button>
      </div>
      <div class="custom-range hidden">
        <input type="date" id="from-date" />
        <span>→</span>
        <input type="date" id="to-date" />
        <button id="apply-range">应用</button>
      </div>
      <div class="granularity" role="group" aria-label="时间粒度">
        粒度
        <button data-granularity="hour">小时</button>
        <button data-granularity="day" class="active">天</button>
      </div>
      <div class="status" id="status">加载中…</div>
      <div class="user-area">
        <span class="user-name" id="user-name"></span>
        <button class="logout-btn" id="logout-btn">退出</button>
      </div>
    </div>
  </header>

  <!-- 官网 tab -->
  <section class="tab-panel active" data-panel="web">
    <div class="bignum-row" style="margin-bottom: 14px;">
      <div class="bignum"><div class="label">曝光总数</div><div class="value accent" id="web-total-views">—</div></div>
      <div class="bignum"><div class="label">点击总数</div><div class="value" id="web-total-clicks">—</div></div>
      <div class="bignum"><div class="label">点击率 (CTR)</div><div class="value muted" id="web-ctr">—</div></div>
    </div>
    <div class="grid">
      <section class="card">
        <h2>① 曝光 / 点击 趋势</h2>
        <canvas id="chart-web-trend" class="chart-lg"></canvas>
      </section>
      <section class="card">
        <h2>② 点击 TOP10（按事件名）</h2>
        <canvas id="chart-web-clicks-by-name" class="chart-md"></canvas>
      </section>
    </div>
  </section>

  <!-- App tab -->
  <section class="tab-panel" data-panel="app">
    <section class="card devices-overview" style="margin-bottom: 14px;">
      <div class="numbers">
        <div class="bignum"><div class="label">活跃 (≤7d)</div><div class="value accent" id="app-active">—</div></div>
        <div class="bignum"><div class="label">已卸载 (&gt;7d)</div><div class="value muted" id="app-uninstalled">—</div></div>
        <div class="bignum"><div class="label">累计</div><div class="value" id="app-total">—</div></div>
      </div>
      <div class="ratio-wrap"><canvas id="chart-app-ratio" class="chart-sm"></canvas></div>
    </section>

    <div class="grid">
      <section class="card">
        <h2>③ DAU + 新装 趋势</h2>
        <canvas id="chart-app-dau" class="chart-lg"></canvas>
      </section>
      <section class="card">
        <h2>④ 版本分布（活跃设备）</h2>
        <canvas id="chart-app-version" class="chart-md"></canvas>
      </section>
    </div>
  </section>

  <script src="app.js"></script>
</body>
</html>
